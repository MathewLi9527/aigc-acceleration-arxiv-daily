name: Run AIGC Acceleration Arxiv Papers Daily

on:
  workflow_dispatch:
  schedule:
    - cron:  "0 0/12 * * *"

env:
  GITHUB_USER_NAME: MathewLi9527
  GITHUB_USER_EMAIL: lmlsky.fly@163.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build:
    name: update
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python Env
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install arxiv
          pip install requests
          pip install pyyaml
          
      - name: Run daily arxiv 
        run: |
          python daily_arxiv.py
          
      - name: Push new aigc-acceleration-arxiv-daily
        uses: github-actions-x/commit@v2.9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Github Action Automatic Update AIGC Acceleration Arxiv Papers"
          files: README.md docs/aigc-acceleration-arxiv-daily.json docs/aigc-acceleration-arxiv-daily-web.json docs/index.md docs/aigc-acceleration-arxiv-daily-wechat.json docs/wechat.md
          rebase: 'true'
          name: ${{ env.GITHUB_USER_NAME }}
          email: ${{ env.GITHUB_USER_EMAIL }}
