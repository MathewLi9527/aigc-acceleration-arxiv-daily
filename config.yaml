base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "MathewLi9527"
repo_name: "aigc-acceleration-arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 15

publish_readme: True
publish_gitpage: True
publish_wechat: True

# file paths
