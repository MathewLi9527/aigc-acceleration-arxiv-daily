        filters: ["Image-to-Video", "Image to Video", "I2V", "Image Animation", "Animating Images", "Video from Image"]
    "Video Editing":
        filters: ["Video Editing", "Video Edit", "Video Inpainting", "Video Manipulation", "Video Style Transfer", "Video Enhancement"]
    "Diffusion Models":
        filters: ["Diffusion Model", "Diffusion Models", "Latent Diffusion", "Stable Diffusion", "DDPM", "Score-based Generative", "Denoising Diffusion"]
    "Real-time Generation":
        filters: ["Real-time Generation", "Real-time Video", "Fast Video Generation", "Efficient Video Generation", "Accelerated Generation", "Video Generation Acceleration", "One-step Generation", "Few-step Generation", "Accelerate Video Generation", "Video Generation Acceleration"]
