# keywords to search - AIGC Acceleration for Video Generation
keywords:
    "Video Generation":
        filters: ["Video Generation", "Video Synthesis", "Text-to-Video", "Text to Video", "Video Diffusion", "Video Diffusion Model", "Video Latent Diffusion", "Video Generation Model", "Generative Video"]
